<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #1a1a1a; font-family: 'Noto Sans Arabic', sans-serif; padding: 15px; }

        .slider-frame {
            position: relative; width: 100%; height: 190px;
            overflow: hidden; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .slider-track {
            display: flex; width: 200%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }

        .slide { width: 50%; height: 100%; flex-shrink: 0; }

        .card-1 {
            background: linear-gradient(135deg, #a32cc4 0%, #6e1a91 100%);
            display: flex; flex-direction: row-reverse; align-items: center;
            padding: 20px; height: 100%;
        }

        .card-2-img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .dots { display: flex; justify-content: center; gap: 6px; margin-top: 15px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; transition: 0.4s; }
        .dot.active { background: #b11380; width: 22px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="slider-frame">
        <div class="slider-track" id="track">
            <div class="slide">
                <div class="card-1">
                    <div style="width:85px;height:85px;background:#9c27b0;border-radius:20px;display:flex;align-items:center;justify-content:center;">
                        <img src="DGT-1L.png" style="width:75%;">
                    </div>
                    <div style="flex:1; margin-left:15px; text-align:left;">
                        <h1 style="font-size:28px;">DGT-1</h1>
                        <p style="font-size:10px; opacity:0.8;">خێراترین خزمەتگوزاری</p>
                    </div>
                </div>
            </div>
            <div class="slide">
                <img src="./dgt10.jpg" class="card-2-img">
            </div>
        </div>
    </div>

    <div class="dots">
        <div class="dot active" id="d1"></div>
        <div class="dot" id="d2"></div>
    </div>

    <script>
        const track = document.getElementById('track');
        const dots = [document.getElementById('d1'), document.getElementById('d2')];
        let i = 0;
        setInterval(() => {
            i = (i === 0) ? 1 : 0;
            track.style.transform = `translateX(${i * 50}%)`;
            dots.forEach((d, index) => d.classList.toggle('active', index === i));
        }, 3000); // ٣ چرکە
    </script>
</body>
</html>
