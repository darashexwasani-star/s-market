<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-MARKET | سەکۆی بازرگانی</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background: #f8fafc; }
        .hidden { display: none; }
        .modal-active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <nav class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black">S</div>
                <h1 class="text-xl font-black text-slate-800 tracking-tighter">MARKET</h1>
            </div>
            <button onclick="openStep1()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition-all active:scale-95 text-sm">
                + پۆستکردن
            </button>
        </div>
    </nav>

    <main class="container mx-auto p-4 py-8">
        <h2 class="text-xl font-black text-slate-800 mb-6 border-r-4 border-blue-600 pr-3">دوایین کاڵاکان</h2>
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="postModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden">
            
            <div id="step1">
                <h3 class="text-2xl font-black mb-6 text-slate-800">زانیاری کاڵا</h3>
                <div class="space-y-4">
                    <div class="h-44 bg-slate-50 rounded-3xl flex items-center justify-center border-2 border-dashed border-slate-200 relative overflow-hidden group">
                        <input type="file" id="fileInput" class="hidden" onchange="previewImg(event)">
                        <img id="prev" class="absolute inset-0 w-full h-full object-cover hidden">
                        <div id="uploadText" class="text-center cursor-pointer" onclick="document.getElementById('fileInput').click()">
                            <div class="text-4xl mb-2 text-slate-300">📸</div>
                            <p class="text-xs font-bold text-slate-400 uppercase">وێنەی کاڵا باربکە</p>
                        </div>
                    </div>
                    <input type="text" id="pName" placeholder="ناوی کاڵا (بۆ نموونە: ئایفۆن ١٥)" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 transition">
                    <input type="number" id="pPrice" placeholder="نرخ ($)" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 transition">
                    <button onclick="openStep2()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-slate-200 hover:bg-blue-600 transition">هەنگاوی دواتر</button>
                </div>
            </div>

            <div id="step2" class="hidden">
                <h3 class="text-2xl font-black mb-6 text-blue-600">زانیاری فرۆشیار</h3>
                <div class="space-y-4">
                    <input type="text" id="sName" placeholder="ناوی تۆ (فرۆشیار)" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 transition">
                    <input type="tel" id="sPhone" placeholder="ژمارەی مۆبایل" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 transition text-left">
                    <input type="text" id="sLocation" placeholder="ناونیشان (شار - گەڕەک)" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 transition">
                    <div class="flex gap-3 pt-2">
                        <button onclick="showStep1Only()" class="w-1/3 bg-slate-100 py-4 rounded-2xl font-bold text-slate-500">گەڕانەوە</button>
                        <button onclick="finalSubmit()" class="w-2/3 bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-blue-200 hover:bg-blue-700 transition">بڵاوکردنەوە</button>
                    </div>
                </div>
            </div>

            <div id="sellerView" class="hidden">
                <div class="text-center mb-6">
                    <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">👤</div>
                    <h3 class="text-2xl font-black text-slate-800" id="viewSName"></h3>
                    <p class="text-slate-400 text-sm font-bold">زانیارییەکانی فرۆشیار</p>
                </div>
                <div class="space-y-4">
                    <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl">
                        <span class="text-xl">📞</span>
                        <div class="text-right">
                            <p class="text-[10px] text-slate-400 font-bold uppercase">ژمارەی پەیوەندی</p>
                            <p id="viewSPhone" class="font-black text-blue-600 text-lg"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl">
                        <span class="text-xl">📍</span>
                        <div class="text-right">
                            <p class="text-[10px] text-slate-400 font-bold uppercase">ناونیشان</p>
                            <p id="viewSLocation" class="font-black text-slate-700"></p>
                        </div>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-full mt-8 bg-slate-900 text-white py-4 rounded-2xl font-bold transition hover:bg-red-600">داخستن</button>
            </div>

            <button onclick="closeModal()" class="absolute top-6 left-6 text-slate-300 hover:text-red-500 transition">✖</button>
        </div>
    </div>

    <script>
        let tempImg = "";

        function previewImg(e) {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('prev').src = reader.result;
                document.getElementById('prev').classList.remove('hidden');
                document.getElementById('uploadText').classList.add('hidden');
                tempImg = reader.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        function openStep1() {
            document.getElementById('postModal').classList.add('modal-active');
            showStep1Only();
        }

        function showStep1Only() {
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('sellerView').classList.add('hidden');
        }

        function openStep2() {
            if(!document.getElementById('pName').value || !document.getElementById('pPrice').value) {
                alert("تکایە ناوی کاڵا و نرخ بنوسە");
                return;
            }
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('postModal').classList.remove('modal-active');
        }

        function finalSubmit() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const sName = document.getElementById('sName').value;
            const sPhone = document.getElementById('sPhone').value;
            const sLoc = document.getElementById('sLocation').value;

            if(!sName || !sPhone) { alert("زانیارییەکان تەواو بکە"); return; }

            const grid = document.getElementById('productGrid');
            const card = document.createElement('div');
            card.className = "bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 hover:shadow-xl transition-all p-2";
            card.innerHTML = `
                <div class="h-48 rounded-[1.5rem] overflow-hidden">
                    <img src="${tempImg}" class="w-full h-full object-cover">
                </div>
                <div class="p-4">
                    <h3 class="font-black text-slate-800 text-lg">${name}</h3>
                    <p class="text-blue-600 font-black text-xl mt-1">$${price}</p>
                    <button onclick="showContact('${sName}', '${sPhone}', '${sLoc}')" class="w-full mt-4 bg-slate-50 py-3 rounded-xl text-xs font-black text-slate-600 hover:bg-blue-600 hover:text-white transition">پەیوەندی</button>
                </div>
            `;

            grid.prepend(card);
            closeModal();
            // پاككردنەوەی فۆرم
            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
            document.getElementById('sName').value = "";
            document.getElementById('sPhone').value = "";
            document.getElementById('prev').classList.add('hidden');
            document.getElementById('uploadText').classList.remove('hidden');
        }

        function showContact(name, phone, loc) {
            document.getElementById('viewSName').innerText = name;
            document.getElementById('viewSPhone').innerText = phone;
            document.getElementById('viewSLocation').innerText = loc;
            
            document.getElementById('postModal').classList.add('modal-active');
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('sellerView').classList.remove('hidden');
        }
    </script>
</body>
</html>
